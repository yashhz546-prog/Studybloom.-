name: studybloom
description: "StudyBloom — a premium daily discipline tracker for students."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.2

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # Fonts & design
  google_fonts: ^6.2.1

  # Dates
  intl: ^0.19.0

  # Celebration animation on high scores
  confetti: ^0.7.0

  # Evening reminder notification
  flutter_local_notifications: ^17.2.2

  # Monthly PDF export
  pdf: ^3.11.0
  printing: ^5.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
